name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static page from README
        run: |
          mkdir -p site
          cp README.md site/README.md
          printf '%s\n' \
            '<!doctype html>' \
            '<html lang="en">' \
            '<head>' \
            '  <meta charset="utf-8" />' \
            '  <meta name="viewport" content="width=device-width, initial-scale=1" />' \
            '  <title>Musical Tuning Optimizer</title>' \
            '  <style>body { max-width: 900px; margin: 2rem auto; padding: 0 1rem; font-family: system-ui, sans-serif; line-height: 1.5; }</style>' \
            '</head>' \
            '<body>' \
            '  <h1>Musical Tuning Optimizer</h1>' \
            '  <p>This page is published by GitHub Actions.</p>' \
            '  <p>Project documentation: <a href="./README.md">README.md</a></p>' \
            '</body>' \
            '</html>' > site/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
